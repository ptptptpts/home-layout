name: AI Codegen (Aider)

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created] # 댓글 생성 시 트리거 추가

env:
  GEMINI_MODEL: gemini-2.0-flash

jobs:
  codegen:
    # 1. PR에 달린 댓글이 아닌 일반 이슈 댓글인 경우에만 실행
    # 2. 봇(github-actions)이 작성한 댓글에는 반응하지 않음 (무한 루프 방지)
    if: github.event.issue.pull_request == null && github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat google-genai

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 프롬프트 구성 시작
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          
          echo -e "\n\n### INITIAL MISSION (Issue Body) ###" >> task_prompt.txt
          echo "${{ github.event.issue.body }}" >> task_prompt.txt
          
          # 댓글(issue_comment)로 실행된 경우, 해당 댓글 내용을 '최우선 피드백'으로 추가
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            echo -e "\n\n### NEW FEEDBACK (User Comment) ###" >> task_prompt.txt
            echo "The user provided the following feedback on the current implementation:" >> task_prompt.txt
            echo "${{ github.event.comment.body }}" >> task_prompt.txt
            echo -e "\n\n⚠️ INSTRUCTION: Address the NEW FEEDBACK as your top priority while maintaining consistency with the initial mission." >> task_prompt.txt
          fi

          echo -e "\n\n### FINAL STEP ###" >> task_prompt.txt
          echo "Generate 'PR_SUMMARY.md' in Korean summarizing your changes before finishing." >> task_prompt.txt
          
          # Aider 실행
          aider --model gemini/${{ env.GEMINI_MODEL }} --yes --message-file task_prompt.txt
          
          # 임시 파일 정리
          rm -f task_prompt.txt

      - name: 📝 Prepare PR Body & Clean History
        id: prepare_body
        run: |
          # PR 본문용 텍스트 생성
          echo "pr_body<<EOF" >> "$GITHUB_OUTPUT"
          if [ -f PR_SUMMARY.md ]; then
            cat PR_SUMMARY.md >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ 기술 보고서(PR_SUMMARY.md)가 생성되지 않았습니다. 로그를 확인해 주세요." >> "$GITHUB_OUTPUT"
          fi
          echo -e "\n\n- Updated by Aider using ${{ env.GEMINI_MODEL }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # PR_SUMMARY.md가 Git 기록에 남지 않도록 정리 (이미 커밋되었을 경우 대비)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm --cached PR_SUMMARY.md || true
          rm -f PR_SUMMARY.md
          # 커밋이 깨끗하게 유지되도록 처리 (수정 사항이 없으면 건너뜀)
          git commit --amend --no-edit || git commit -m "chore: cleanup summary file" || echo "Nothing to cleanup"

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: address feedback for issue #${{ github.event.issue.number }}"
          title: "🤖 AI 작업 완료: 이슈 #${{ github.event.issue.number }}"
          body: ${{ steps.prepare_body.outputs.pr_body }}
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main
