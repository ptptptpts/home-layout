name: AI Codegen

on:
  issues:
    types: [opened, edited]

env:
  GEMINI_MODEL: gemini-3-flash-preview

jobs:
  codegen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat google-genai

      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          echo -e "\n\n### CURRENT TASK ###" >> task_prompt.txt
          echo "Issue Title: ${{ github.event.issue.title }}" >> task_prompt.txt
          echo "Issue Body: ${{ github.event.issue.body }}" >> task_prompt.txt
          
          aider --model gemini/${{ env.GEMINI_MODEL }} --yes --message-file task_prompt.txt
          rm -f task_prompt.txt

      - name: 📝 Prepare PR Body
        id: prepare_body
        run: |
          {
            echo "pr_body<<EOF"
            if [ -f PR_SUMMARY.md ]; then cat PR_SUMMARY.md; else echo "⚠️ 기술 보고서가 생성되지 않았습니다."; fi
            echo -e "\n\n- Generated by Aider with ${{ env.GEMINI_MODEL }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          rm -f PR_SUMMARY.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: ${{ github.event.issue.title }}"
          title: "🤖 AI 작업 완료: ${{ github.event.issue.title }}"
          body: ${{ steps.prepare_body.outputs.pr_body }}
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main
