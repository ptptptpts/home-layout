name: Aider AI Agent

on:
  issues:
    types: [opened, edited]

env:
  # 최신 모델명 유지
  GEMINI_MODEL: gemini-3-flash-preview

jobs:
  aider-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 신형 라이브러리인 google-genai 설치
          pip install aider-chat google-genai

      - name: ✅ Check Gemini Connection (New SDK)
        id: check_model
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURRENT_MODEL: ${{ env.GEMINI_MODEL }}
        run: |
          python -c "
          from google import genai
          import os
          try:
              # 신형 SDK 방식: Client 객체 생성
              client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
              model_id = os.environ['CURRENT_MODEL']
              
              # 연결 테스트
              response = client.models.generate_content(
                  model=model_id,
                  contents='hi'
              )
              
              with open('model_info.txt', 'w') as f:
                  f.write(f'✅ Connection: SUCCESS (New SDK)\n🤖 Model: {model_id}\n📡 Status: Active')
          except Exception as e:
              with open('model_info.txt', 'w') as f:
                  f.write(f'❌ Connection: FAILED\n⚠️ Error: {str(e)}')
          "
      
      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          echo -e "\n\n### CURRENT TASK ###" >> task_prompt.txt
          echo "Issue Title: ${{ github.event.issue.title }}" >> task_prompt.txt
          echo "Issue Body: ${{ github.event.issue.body }}" >> task_prompt.txt
          
          # Aider 실행
          aider --model gemini/${{ env.GEMINI_MODEL }} --yes --message-file task_prompt.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: AI task completion using ${{ env.GEMINI_MODEL }}"
          title: "🤖 AI 작업 완료: ${{ github.event.issue.title }}"
          body: |
            ### 🛠️ System Information
            $(cat model_info.txt)
            - Python Version: `3.12`
            - SDK: `google-genai` (Latest)
            
            ---
            **이슈 #${{ github.event.issue.number }}에 대한 작업 보고서**
            - **Surgical Editing**: 정밀 수정 원칙 준수.
            - **Step-by-Step TDD**: 설계 -> 테스트 -> 구현 단계 이행.
            - **Data Schema**: Base64 인코딩 및 MD5 체크섬 적용 완료.
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main
