name: Aider AI Agent

on:
  issues:
    types: [opened, edited]

# 1. 여기서 모델 버전을 전역 변수로 관리합니다.
env:
  GEMINI_MODEL: gemini-3-flash-preview

jobs:
  aider-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat google-generativeai

      - name: ✅ Check Gemini Connection & Model
        id: check_model
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURRENT_MODEL: ${{ env.GEMINI_MODEL }} # 변수 사용
        run: |
          python -c "
          import google.generativeai as genai
          import os
          try:
              genai.configure(api_key=os.environ['GEMINI_API_KEY'])
              model_name = os.environ['CURRENT_MODEL']
              model = genai.GenerativeModel(model_name)
              response = model.generate_content('Say: Connection Successful!')
              with open('model_info.txt', 'w') as f:
                  f.write(f'✅ Connection: SUCCESS\n🤖 Model: {model_name}\n💬 Response: {response.text}')
          except Exception as e:
              with open('model_info.txt', 'w') as f:
                  f.write(f'❌ Connection: FAILED\n⚠️ Error: {str(e)}')
          "
      
      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          echo -e "\n\n### CURRENT TASK ###" >> task_prompt.txt
          echo "Issue Title: ${{ github.event.issue.title }}" >> task_prompt.txt
          echo "Issue Body: ${{ github.event.issue.body }}" >> task_prompt.txt
          
          # 2. Aider 실행 시 변수 적용 (aider는 gemini/ 접두사가 필요합니다)
          aider --model gemini/${{ env.GEMINI_MODEL }} --yes --message-file task_prompt.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: AI implementation using ${{ env.GEMINI_MODEL }}"
          title: "🤖 AI 작업 완료: ${{ github.event.issue.title }}"
          body: |
            ### 🛠️ AI Model Connection Status
            $(cat model_info.txt)
            
            ---
            **이슈 #${{ github.event.issue.number }}에 대한 작업이 완료되었습니다.**
            - 사용 모델: `${{ env.GEMINI_MODEL }}`
            - **Surgical Editing** 원칙 및 **TDD** 규칙 준수 완료.
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main
