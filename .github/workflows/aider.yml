name: Aider AI Agent

on:
  issues:
    types: [opened, edited]

env:
  GEMINI_MODEL: gemini-3-flash-preview

jobs:
  aider-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat google-genai

      - name: ✅ Check Gemini Connection
        id: check_model
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURRENT_MODEL: ${{ env.GEMINI_MODEL }}
        run: |
          python -c "
          from google import genai
          import os
          try:
              client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
              model_id = os.environ['CURRENT_MODEL']
              client.models.generate_content(model=model_id, contents='hi')
              with open('model_info.txt', 'w') as f:
                  f.write(f'✅ Connection: SUCCESS\n🤖 Model: {model_id}')
          except Exception as e:
              with open('model_info.txt', 'w') as f:
                  f.write(f'❌ Connection: FAILED\n⚠️ Error: {str(e)}')
          "
      
      - name: Run Aider
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          echo -e "\n\n### CURRENT TASK ###" >> task_prompt.txt
          echo "Issue Title: ${{ github.event.issue.title }}" >> task_prompt.txt
          echo "Issue Body: ${{ github.event.issue.body }}" >> task_prompt.txt
          
          # Aider 실행
          aider --model gemini/${{ env.GEMINI_MODEL }} --yes --message-file task_prompt.txt
          
          # 작업 직후 임시 프롬프트 삭제
          rm -f task_prompt.txt

      - name: 📝 Extract Summary & Cleanup
        id: prepare_body
        run: |
          # PR 본문에 들어갈 내용을 변수에 담기
          {
            echo "pr_body<<EOF"
            echo "### 🛠️ System Status"
            if [ -f model_info.txt ]; then cat model_info.txt; fi
            echo -e "\n---"
            if [ -f PR_SUMMARY.md ]; then
              cat PR_SUMMARY.md
            else
              echo "⚠️ 상세 기술 보고서가 생성되지 않았습니다."
            fi
            echo -e "\n\n- Environment: Python 3.12 / SDK google-genai"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          # *** 핵심: PR 생성 전 모든 임시 파일을 삭제하여 커밋 방지 ***
          rm -f PR_SUMMARY.md model_info.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: ${{ github.event.issue.title }}"
          title: "🤖 AI 작업 완료: ${{ github.event.issue.title }}"
          body: ${{ steps.prepare_body.outputs.pr_body }}
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main
