name: Aider AI Agent

on:
  issues:
    types: [opened, edited] # 이슈가 새로 생성되거나 수정될 때 실행

jobs:
  aider-job:
    runs-on: ubuntu-latest
    # 깃허브 Actions가 코드를 수정하고 PR을 올릴 수 있는 권한 설정
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 전체 히스토리를 가져와야 AI가 맥락을 잘 파악합니다.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Run Aider with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Aider에게 줄 설정들
        run: |
          # 1. AI_RULES.md와 현재 이슈 내용을 하나의 작업 지시서로 합칩니다.
          echo "### PROJECT RULES ###" > task_prompt.txt
          cat AI_RULES.md >> task_prompt.txt
          echo -e "\n\n### CURRENT TASK ###" >> task_prompt.txt
          echo "Issue Title: ${{ github.event.issue.title }}" >> task_prompt.txt
          echo "Issue Body: ${{ github.event.issue.body }}" >> task_prompt.txt
          
          # 2. Aider 실행
          # --model: Gemini Ultra/Pro 사용을 위해 gemini/gemini-1.5-pro (또는 최신) 지정
          # --yes: 모든 코드 수정을 자동으로 승인
          # --message-file: 작성된 지시서 파일을 읽어서 작업 시작
          aider --model gemini/gemini-1.5-pro --yes --message-file task_prompt.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: AI implementation for issue #${{ github.event.issue.number }}"
          title: "🤖 AI 작업 완료: ${{ github.event.issue.title }}"
          body: |
            AI 에이전트(Aider)가 이슈 #${{ github.event.issue.number }}에 대한 작업을 완료했습니다.
            
            **작업 요약:**
            - 프로젝트 규칙(`AI_RULES.md`) 준수 여부 확인 완료
            - 최소 수정 원칙(Surgical Editing) 적용
            - TDD 절차에 따른 테스트 및 기능 구현
            
            Vercel 프리뷰 링크를 통해 모바일에서 직접 확인해 보세요!
          branch: "ai/issue-${{ github.event.issue.number }}"
          base: main # 혹은 고객님의 기본 브랜치 이름

